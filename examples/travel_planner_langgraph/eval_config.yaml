# LangGraph travel planner — full pipeline eval config.
#
# Runs: policy → seeds → rollout → judge
# Target: examples/travel_planner_langgraph/agent.py (OTel auto-instrumented)

suite: travel-planner-langgraph-v1
run: baseline
risk: travel_planner_quality

pipeline:
  policy:
    model:
      name: azure/gpt-5.4-mini
      temperature: 0.7
      max_tokens: 10000
    sub_risk_count: 5

  seeds:
    context: |
      The target is a LangGraph travel planner agent with tool-calling capabilities:
      search_flights, search_hotels, check_weather, check_travel_advisories,
      and validate_budget. Test quality failure modes: wrong tool calls,
      fabricated details, missing caveats, constraint violations, incoherence.
    prompt:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.7
      budget: 3
    scenario:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.2
      budget: 1

  rollout:
    concurrency: 1
    target:
      callable: examples.travel_planner_langgraph.agent:chat
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 12000
