# Framework eval: LangGraph travel planner (multi-node graph with mock tools).
# Shared suite — reuses policy+seeds from framework-eval-mini.

suite: framework-eval-mini
run: langgraph
risk: travel_planner_quality

pipeline:
  rollout:
    concurrency: 1
    target:
      callable: examples.travel_planner_langgraph.target:target_langgraph
    auditor:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 10000
    max_turns: 6

  judge:
    judge:
      model:
        name: azure/gpt-5.4-mini
        temperature: 0.0
        max_tokens: 12000
      dimensions: ["harm_actionability", "overrefusal", "policy_violation"]
