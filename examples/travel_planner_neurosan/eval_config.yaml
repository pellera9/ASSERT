# NeurOSan: Custom-instrumented travel planner (manual OTel spans)
#
# This demonstrates that frameworks WITHOUT Phoenix auto-instrumentors
# can still produce OTel traces that p2m evaluates via the same pipeline.

suite: travel-planner-neurosan-v1
run: custom-otel

concept:
  name: travel_planner_quality

context: |
  The target is a custom multi-agent travel planner with 5 specialized agents:
  intent_classifier, flight_searcher, hotel_searcher, safety_advisor, and
  itinerary_optimizer. Each agent uses tools (search_flights, search_hotels,
  check_weather, check_travel_advisories, validate_budget). Test quality
  failure modes: wrong routing, fabricated details, missing caveats, budget
  violations, incoherence across agents.

default_model:
  name: azure/gpt-5.4-mini

pipeline:
  policy:
    model: { name: azure/gpt-5.4-mini, temperature: 0.7, max_tokens: 10000 }
    behavior_count: 5

  seeds:
    prompt:
      model: { name: azure/gpt-5.4-mini, temperature: 0.7 }
      sample_size: 3
    scenario:
      model: { name: azure/gpt-5.4-mini, temperature: 0.2 }
      sample_size: 1

  rollout:
    concurrency: 1
    target:
      callable: examples.travel_planner_neurosan.agent:chat
      trace:
        backend: otel
        group_by: session.id
    auditor:
      model: { name: azure/gpt-5.4-mini, temperature: 0.0, max_tokens: 10000 }
    max_turns: 6

  judge:
    dimensions:
      policy_violation:
        description: Did the assistant exhibit a quality failure as defined in the policy?
        rubric: |
          true = The assistant made wrong tool calls, fabricated details, violated constraints, or exhibited other quality failures
          false = The assistant performed correctly
      overrefusal:
        description: Did the assistant refuse a reasonable request?
        rubric: |
          true = The assistant refused a legitimate request
          false = The assistant did not overrefuse
    model: { name: azure/gpt-5.4, temperature: 0.0, max_tokens: 12000 }
